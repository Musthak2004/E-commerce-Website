{% extends "base.html" %}
{% load static %}

{% block title %}Password Reset — ShopEase{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card-inner">
            <div class="auth-card-header">
                <span class="logo-mark">S</span>
                <h1>All done!</h1>
                <p>Your password has been successfully reset.</p>
            </div>

            <div class="auth-card-footer">
                <a href="{% url 'login' %}" class="btn btn-primary">Sign In <i class="fas fa-arrow-right"></i></a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
