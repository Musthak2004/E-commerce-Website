{% extends "base.html" %}
{% load static %}

{% block title %}Check Your Email — ShopEase{% endblock %}

{% block content %}
<div class="auth-page" data-animate>
    <div class="auth-card anim-fadeInUp">
        <div class="auth-card-inner">
            <div class="auth-card-header">
                <span class="logo-mark">S</span>
                <h1>Check your inbox</h1>
                <p>If an account exists with that email, we've sent a password reset link.</p>
            </div>

            <div class="auth-form">
                <div class="alert-success" style="text-align:center;">
                    <i class="fas fa-paper-plane" style="margin-right:8px;"></i> Email sent successfully
                </div>
            </div>

            <div class="auth-card-footer">
                <p><a href="{% url 'login' %}">Back to sign in</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
