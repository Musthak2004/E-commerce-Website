{% extends "base.html" %}
{% load static %}

{% block title %}Checkout — ShopEase{% endblock %}

{% block content %}
<section class="form-page checkout-page" data-animate>
  <div class="form-card checkout-card">
    <div class="checkout-icon">
      <i class="fas fa-lock"></i>
    </div>
    <h1 class="checkout-title">Redirecting to Checkout</h1>
    <p class="checkout-desc">
      You'll be redirected to Stripe's secure checkout to complete your payment.
    </p>
    <div class="checkout-spinner"></div>
    <a href="{% url 'orders:order_detail' order.id %}" class="btn btn-secondary">
      <i class="fas fa-arrow-left"></i> Back to Order
    </a>
  </div>
</section>
{% endblock %}
