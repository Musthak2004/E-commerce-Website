<article class="cart-row" id="cart-item-{{ item.id }}" style="--i:1">

  <!-- Image -->
  <a href="{% url 'products:product_detail' item.product.slug %}" class="cart-row-img">
    {% if item.product.image %}
      <img src="{{ item.product.image_url }}" alt="{{ item.product.name }}" loading="lazy">
    {% else %}
      <span class="img-fallback"><i class="fas fa-box"></i></span>
    {% endif %}
  </a>

  <!-- Body -->
  <div class="cart-row-body">

    <!-- Top row: meta + unit price -->
    <div class="cart-row-top">
      <div class="cart-row-meta">
        {% if item.product.category %}
          <span class="cart-row-category">{{ item.product.category.name }}</span>
        {% endif %}
        <a href="{% url 'products:product_detail' item.product.slug %}" class="cart-row-name">
          {{ item.product.name }}
        </a>
      </div>
      <span class="cart-row-unit">${{ item.product.price }}</span>
    </div>

    <!-- Divider -->
    <div class="cart-row-divider"></div>

    <!-- Bottom row: qty + line total + remove -->
    <div class="cart-row-bottom">

      <form class="qty-selector"
            hx-post="{% url 'cart:update_quantity' item.id %}"
            hx-target="#cart-item-{{ item.id }}"
            hx-swap="outerHTML">
        <button type="submit"
                name="quantity"
                value="{{ item.quantity|add:-1 }}"
                class="qty-btn"
                {% if item.quantity <= 1 %}disabled{% endif %}
                aria-label="Decrease quantity">
          <i class="fas fa-minus"></i>
        </button>
        <span class="qty-value">{{ item.quantity }}</span>
        <button type="submit"
                name="quantity"
                value="{{ item.quantity|add:1 }}"
                class="qty-btn"
                aria-label="Increase quantity">
          <i class="fas fa-plus"></i>
        </button>
      </form>

      <div class="cart-row-right">
        <span class="cart-row-total">${{ item.total_price }}</span>
        <form hx-post="{% url 'cart:remove_from_cart' item.id %}"
              hx-target="#cart-content-region"
              hx-swap="innerHTML">
          <button type="submit" class="cart-row-remove" aria-label="Remove item"
                  hx-confirm="Remove {{ item.product.name }} from your cart?">
            <i class="fas fa-trash-can"></i>
            <span>Remove</span>
          </button>
        </form>
      </div>

    </div>
  </div>

</article>
