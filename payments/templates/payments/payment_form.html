{% extends "base.html" %}
{% load static %}

{% block title %}Checkout — ShopEase{% endblock %}

{% block content %}
<section class="form-page">
  <div class="form-card anim-up" style="text-align:center;padding:48px 32px;">
    <div style="font-size:3rem;color:var(--accent);margin-bottom:20px;">
      <i class="fas fa-lock"></i>
    </div>
    <h1 style="margin:0 0 8px;">Redirecting to Checkout</h1>
    <p style="color:var(--text-secondary);margin:0 0 32px;font-size:1rem;">
      You'll be redirected to Stripe's secure checkout to complete your payment.
    </p>
    <div class="spinner" style="width:40px;height:40px;margin:0 auto 24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;"></div>
    <a href="{% url 'orders:order_detail' order.id %}" class="btn btn-secondary">
      <i class="fas fa-arrow-left"></i> Back to Order
    </a>
  </div>
</section>
<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>
{% endblock %}
