{% extends "base.html" %}
{% load static %}

{% block title %}Delete {{ product.name }} — ShopEase{% endblock %}

{% block content %}

<section class="form-page">
    <div class="form-card anim-scale" style="max-width: 480px;">
        <div class="form-card-header">
            <a href="{% url 'products:product_detail' product.slug %}" class="back-link">
                <i class="fas fa-arrow-left"></i> Back
            </a>
            <h1>Delete Product</h1>
            <p>Are you sure you want to delete <strong>{{ product.name }}</strong>? This action cannot be undone.</p>
        </div>

        <form class="styled-form" method="post">
            {% csrf_token %}
            <div class="form-actions" style="border: none; margin-top: 0; padding-top: 0;">
                <a href="{% url 'products:product_detail' product.slug %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary" style="background: #dc2626;">
                    <i class="fas fa-trash"></i> Delete
                </button>
            </div>
        </form>
    </div>
</section>

{% endblock %}
