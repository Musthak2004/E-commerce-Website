{% extends "base.html" %}
{% block title %}Page Not Found — ShopEase{% endblock %}
{% block content %}
<div class="error-page">
    <div class="error-card">
        <span class="error-code">404</span>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <div class="error-actions">
            <a href="{% url 'home' %}" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <a href="{% url 'products:product_list' %}" class="btn btn-secondary">Browse Products</a>
        </div>
    </div>
</div>
{% endblock %}
